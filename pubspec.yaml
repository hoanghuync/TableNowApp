name: tablenowapp
description: "Rustic Kitchen restaurant mobile app with Flutter and Firebase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.1.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.1.2
  firebase_core: ^4.9.0
  firebase_storage: ^13.0.4
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  image_picker: ^1.2.1
  intl: ^0.20.2
  provider: ^6.1.5+1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
